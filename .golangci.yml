# golangci-lint v2 설정 파일
# 방침: "최대한 꼼꼼하게" — 노이즈가 확인된 규칙만 선별적으로 비활성화한다.
# Uber Go Style Guide + 커뮤니티 모범 사례 기반 54개 린터 활성화.
version: "2"

linters:
  # default: none으로 설정하면 모든 린터를 비활성화한 뒤 enable 목록만 활성화한다.
  # 암묵적으로 켜지는 린터 없이, 정확히 어떤 검사가 돌아가는지 명시적으로 관리한다.
  default: none

  enable:
    # ===================================================================
    # 필수 린터 (모든 Go 프로젝트 공통)
    # ===================================================================

    # errcheck: 에러 반환값을 무시하는 코드를 찾는다.
    # Go에서 err를 체크하지 않는 것은 NestJS에서 try-catch 없이 await하는 것과 같다.
    - errcheck

    # govet: Go 컴파일러 팀이 만든 정적 분석 도구. 컴파일은 되지만 버그일 가능성이 높은 코드를 찾는다.
    # 예: printf 포맷 문자열 불일치, 구조체 복사 시 lock 복사, 도달 불가능한 코드 등
    - govet

    # staticcheck: Go 커뮤니티 표준 정적 분석 도구.
    # govet보다 넓은 범위의 버그, 성능 문제, 사용되지 않는 코드를 찾는다.
    - staticcheck

    # ineffassign: 이후에 사용되지 않는 변수 할당을 찾는다.
    # 예: err = doSomething() 후 err를 체크하지 않고 덮어쓰는 경우
    - ineffassign

    # unused: 사용되지 않는 함수, 변수, 타입, 상수를 찾는다.
    # 죽은 코드(dead code)를 정리하는 데 유용하다.
    - unused

    # ===================================================================
    # 에러 처리 린터 — Go에서 에러 처리는 가장 중요한 관례다
    # ===================================================================

    # errorlint: Go 1.13+ 에러 래핑/비교 패턴의 올바른 사용을 검사한다.
    # errors.Is(), errors.As()를 사용해야 하는데 == 비교를 하는 경우를 찾는다.
    # NestJS의 instanceof 체크 대신 Go는 errors.Is()를 써야 한다.
    - errorlint

    # nilerr: if err != nil 블록 안에서 nil을 반환하는 실수를 찾는다.
    # 예: if err != nil { return nil } ← 에러를 삼켜버리는 코드
    - nilerr

    # nilnesserr: err != nil을 체크한 뒤 다른 nil 에러를 반환하는 코드를 찾는다.
    # 예: if err != nil { return nil, fmt.Errorf(...) } ← 첫 번째 반환값이 nil이면
    #     호출자가 nil 체크 없이 사용할 위험이 있다.
    - nilnesserr

    # nilnil: 에러와 값이 동시에 nil인 반환을 찾는다.
    # 예: return nil, nil ← 호출자가 에러가 없다고 판단하지만 값도 없는 상태.
    # 호출자가 nil 체크 없이 값을 사용하면 panic이 발생한다.
    - nilnil

    # errname: 에러 변수와 타입의 네이밍 컨벤션을 강제한다.
    # Uber 스타일 가이드: 에러 값은 ErrFoo, 에러 타입은 FooError 형식이어야 한다.
    # 예: var ErrNotFound = ... (O), var NotFoundErr = ... (X)
    # 예: type ValidationError struct{} (O), type ErrValidation struct{} (X)
    - errname

    # err113: 동적 에러 생성을 금지하고 센티넬 에러(패키지 레벨 변수) 사용을 강제한다.
    # 예: return errors.New("not found") ← 금지 (매번 새 에러 생성)
    # 예: return ErrNotFound ← 권장 (사전 정의된 센티넬 에러)
    # 센티넬 에러를 사용하면 errors.Is()로 비교할 수 있어 에러 처리가 일관적이 된다.
    - err113

    # wrapcheck: 외부 패키지에서 반환된 에러를 반드시 래핑(%w)하도록 강제한다.
    # 프로젝트 내부(rest-api/*) 에러는 래핑 불필요, 외부 의존성 에러만 검사.
    # 예: return fmt.Errorf("DB 조회 실패: %w", err) ← 외부 에러 래핑 필수
    # NestJS에서 외부 라이브러리 에러를 InternalServerErrorException으로 감싸는 것과 동일.
    - wrapcheck

    # ===================================================================
    # Uber 스타일 강제 린터
    # ===================================================================

    # gochecknoinits: init() 함수 사용을 금지한다.
    # Uber 스타일 가이드: init()은 암묵적 실행으로 디버깅이 어렵다.
    # 대신 fx.Provide() 등 명시적 초기화를 사용한다.
    # NestJS에서 모든 초기화를 모듈 시스템에서 명시적으로 하는 것과 같은 원칙.
    - gochecknoinits

    # gochecknoglobals: 패키지 레벨 전역 변수를 금지한다.
    # Uber 스타일 가이드: 전역 변수는 의도치 않은 사이드 이펙트를 유발한다.
    # fx DI로 모든 상태를 주입받아 사용한다.
    # 예외: 센티넬 에러(ErrXxx)는 Go 관례상 허용 (exclusions에서 설정).
    - gochecknoglobals

    # nestif: if문 중첩 깊이를 제한한다 (기본 5단계).
    # Uber 스타일 가이드: 네스팅을 줄이고 early return(guard clause)을 사용한다.
    # 깊은 중첩은 가독성을 떨어뜨리고 테스트를 어렵게 만든다.
    - nestif

    # noctx: HTTP 요청 시 context.Context 전달을 강제한다.
    # http.Get() 대신 http.NewRequestWithContext()를 사용하도록 한다.
    # context가 없으면 요청 취소, 타임아웃, 트레이싱이 불가능하다.
    - noctx

    # contextcheck: 함수 호출 체인에서 context 전파 누락을 검출한다.
    # handler → service → repository로 context가 끊기지 않고 전달되는지 확인.
    # 분산 트레이싱과 요청 취소에 필수적인 패턴.
    - contextcheck

    # ireturn: "Accept interfaces, return structs" 패턴을 강제한다.
    # Uber 스타일 가이드: 함수는 구체 타입을 반환하고, 인터페이스는 호출자가 정의한다.
    # 예외: error, stdlib 인터페이스, fx.Option, DDD 레이어 생성자(exclusions에서 설정).
    - ireturn

    # depguard: 특정 패키지의 import를 금지한다.
    # 예: "log" 패키지 금지 → go.uber.org/zap 사용 강제.
    # NestJS에서 ESLint no-restricted-imports 규칙과 동일.
    - depguard

    # nonamedreturns: named return(이름 있는 반환값)을 금지한다.
    # 예: func foo() (result string, err error) ← 금지
    # 예: func foo() (string, error) ← 허용
    # named return은 긴 함수에서 반환값 추적을 어렵게 만든다.
    - nonamedreturns

    # ===================================================================
    # 스타일/품질 린터
    # ===================================================================

    # revive: golint의 후속 린터. Go 커뮤니티 스타일 규칙을 검사한다.
    - revive

    # gocritic: 다양한 코드 패턴 검사 (불필요한 타입 변환, 단순화 가능한 코드 등)
    - gocritic

    # goconst: 반복되는 문자열/숫자 리터럴을 찾아 상수로 추출하라고 제안한다.
    - goconst

    # unconvert: 불필요한 타입 변환을 찾는다. 예: int(myInt) (이미 int인 경우)
    - unconvert

    # misspell: 주석과 문자열의 영어 오타를 찾는다.
    - misspell

    # whitespace: 함수 시작/끝의 불필요한 빈 줄을 찾는다.
    - whitespace

    # dupword: 주석에서 중복된 단어를 찾는다. 예: "the the"
    - dupword

    # modernize: Go 최신 버전의 기능 사용을 권장한다.
    # 예: errors.Join() (Go 1.20+), slices.Sort() (Go 1.21+) 등
    # 구버전 패턴 대신 표준 라이브러리의 최신 기능을 활용하도록 안내.
    - modernize

    # tagalign: 구조체 태그를 정렬하여 가독성을 높인다.
    # 예: json:"name"  validate:"required" → 태그 간 정렬 통일
    - tagalign

    # unparam: 사용되지 않는 함수 파라미터를 검출한다.
    # 불필요한 파라미터는 코드를 복잡하게 만들고 호출자를 혼란스럽게 한다.
    - unparam

    # ===================================================================
    # 버그 방지 린터 — 컴파일은 되지만 런타임에 문제를 일으키는 패턴
    # ===================================================================

    # durationcheck: time.Duration 연산 실수를 찾는다.
    # 예: time.Duration(1) * time.Second ← 1나노초 * 1초 = 1초 (의도와 다를 수 있음)
    # NestJS에서는 ms 단위 숫자만 쓰지만, Go에서는 Duration 타입을 이해해야 한다.
    - durationcheck

    # forcetypeassert: 안전하지 않은 타입 단언(type assertion)을 찾는다.
    # 예: val := m["key"].(string) ← key가 없거나 타입이 다르면 panic 발생
    #     val, ok := m["key"].(string) ← 안전한 방식 (ok로 확인)
    # NestJS의 as unknown as string처럼 위험한 캐스팅을 잡아준다.
    - forcetypeassert

    # exhaustive: switch문에서 enum(iota 상수)의 모든 case를 처리했는지 검사한다.
    # NestJS/TypeScript의 exhaustive check(never 타입 활용)와 같은 개념이다.
    # 새 상수를 추가했는데 switch문에 case를 빠뜨리면 바로 알 수 있다.
    - exhaustive

    # nakedret: 큰 함수에서 이름 있는 반환값(named return)을 그냥 return하는 코드를 찾는다.
    # 예: func foo() (result string, err error) { ... return } ← 뭘 반환하는지 불명확
    # 함수가 길어지면 named return이 어떤 값인지 추적이 어려워 버그를 유발한다.
    - nakedret

    # containedctx: 구조체 필드에 context.Context를 저장하는 코드를 찾는다.
    # context.Context는 함수 인자로 전달해야 하며, 구조체에 저장하면 생명주기 관리가 꼬인다.
    # Go 공식 문서에서도 "Do not store Contexts inside a struct type"이라고 명시한다.
    - containedctx

    # asasalint: []any를 ...any 파라미터에 잘못 전달하는 실수를 찾는다.
    # 예: fmt.Println([]any{1,2,3}...) vs fmt.Println([]any{1,2,3})
    - asasalint

    # reassign: 패키지 레벨 변수가 예기치 않게 재할당되는 것을 찾는다.
    # 전역 변수 변경은 의도치 않은 사이드 이펙트를 유발한다.
    - reassign

    # wastedassign: 사용되지 않는 할당을 찾는다 (ineffassign보다 넓은 범위).
    - wastedassign

    # ===================================================================
    # 복잡도/길이 제한 린터
    # ===================================================================

    # gocognit: 인지 복잡도(Cognitive Complexity)를 측정하여 제한한다.
    # 순환 복잡도(cyclomatic)와 달리, 사람이 코드를 이해하기 얼마나 어려운지를 측정한다.
    # 중첩된 조건문, break/continue, 재귀 등이 점수를 높인다.
    # 기본값 30: 이 이상이면 함수를 분리해야 한다.
    - gocognit

    # funlen: 함수 길이를 제한한다.
    # 긴 함수는 단일 책임 원칙(SRP) 위반의 신호다.
    # 100줄 설정: 한국어 주석이 많은 이 프로젝트의 특성을 고려한 여유있는 값.
    - funlen

    # lll: 한 줄의 최대 길이를 제한한다.
    # 150자 설정: 한국어 주석(글자당 3바이트)과 struct tag를 고려한 값.
    # 가로 스크롤 없이 코드를 읽을 수 있도록 한다.
    - lll

    # dupl: 중복된 코드 블록을 검출한다 (기본 150토큰).
    # 복사-붙여넣기 코드는 유지보수 비용을 증가시킨다.
    # 중복이 발견되면 공통 함수로 추출하라는 신호.
    - dupl

    # ===================================================================
    # 매직 넘버/변수명 린터
    # ===================================================================

    # mnd: 매직 넘버(하드코딩된 숫자)를 금지한다.
    # 예: if status == 200 ← 금지, if status == http.StatusOK ← 권장
    # 관대한 예외: 0, 1, 2, 10, 100 및 make/strconv/time 함수 호출 허용.
    - mnd

    # varnamelen: 변수명 길이가 사용 범위(스코프)에 비례하는지 검사한다.
    # 짧은 스코프에서는 i, n 같은 짧은 이름 OK, 긴 스코프에서는 설명적 이름 필요.
    # Go 관례적 짧은 이름(err, ctx, db, tx, ok 등)은 예외로 허용.
    - varnamelen

    # ===================================================================
    # 성능 린터
    # ===================================================================

    # perfsprint: fmt.Sprintf 대신 더 빠른 대안을 제안한다.
    # 예: fmt.Sprintf("%d", n) → strconv.Itoa(n) (약 3배 빠름)
    - perfsprint

    # prealloc: append를 반복 호출하는 슬라이스에 make([]T, 0, cap) 사전 할당을 제안한다.
    # 사전 할당하면 내부적으로 배열 확장(re-allocation)이 줄어 성능이 개선된다.
    - prealloc

    # usestdlibvars: 표준 라이브러리에 이미 정의된 상수 사용을 권장한다.
    # 예: "GET" 대신 http.MethodGet, 200 대신 http.StatusOK
    # REST API에서 매직 넘버/문자열 대신 의미가 명확한 상수를 사용하게 해준다.
    - usestdlibvars

    # ===================================================================
    # 보안 린터
    # ===================================================================

    # gosec: Go 코드의 보안 취약점을 찾는다 (하드코딩된 비밀번호, SQL 인젝션 등).
    # REST API 프로젝트에서 필수.
    - gosec

    # ===================================================================
    # HTTP/DB 리소스 관리 린터
    # ===================================================================

    # bodyclose: HTTP 응답의 Body를 Close()하지 않는 코드를 찾는다.
    # 리소스 누수(resource leak)를 방지한다.
    - bodyclose

    # sqlclosecheck: database/sql의 Rows, Stmt 등을 Close()하지 않는 코드를 찾는다.
    # DB 커넥션 풀 고갈을 방지한다.
    - sqlclosecheck

    # ===================================================================
    # 테스트 품질 린터
    # ===================================================================

    # testifylint: testify 라이브러리의 올바른 사용 패턴을 강제한다.
    # 예: assert.Equal(t, expected, actual) ← 인자 순서 강제
    # 아키텍처 테스트에서 testify 사용을 강제하므로, 이 린터로 올바른 사용법까지 검증.
    - testifylint

    # thelper: 테스트 헬퍼 함수에 t.Helper() 호출을 강제한다.
    # t.Helper()가 없으면 테스트 실패 시 헬퍼 함수 내부가 에러 위치로 표시된다.
    # t.Helper()를 호출하면 실제 테스트 코드의 위치가 표시되어 디버깅이 쉬워진다.
    - thelper

    # paralleltest: 테스트 함수에 t.Parallel() 호출을 권장한다.
    # 병렬 테스트는 실행 시간을 단축하고 경쟁 조건(race condition)을 조기 발견한다.
    # 주의: SQLite 단일 연결 등 병렬 불가한 테스트는 //nolint:paralleltest 사용.
    - paralleltest

    # ===================================================================
    # nolint 규율
    # ===================================================================

    # nolintlint: //nolint 주석의 올바른 사용을 강제한다.
    # //nolint 사용 시 반드시 이유를 적도록 한다.
    # 예: //nolint:errcheck // 이 에러는 의도적으로 무시한다
    - nolintlint

  settings:
    # --- 기존 린터 설정 ---

    revive:
      rules:
        # exported 규칙 비활성화: 모든 공개(exported) 함수/타입에 주석을 강제하는 규칙.
        # 이 프로젝트는 한국어 주석을 자유롭게 작성하므로, godoc 형식 강제는 불필요하다.
        - name: exported
          disabled: true

    govet:
      # 모든 govet 분석기를 활성화한다.
      # shadow, nilness, unusedwrite 등 기본으로 꺼져있는 유용한 검사를 모두 켠다.
      #
      # shadow 검사가 특히 중요하다:
      # 외부 스코프의 변수를 내부 스코프에서 같은 이름으로 재선언하는 경우를 찾는다.
      # 예: err := outerFunc()  →  if err := innerFunc(); err != nil { ... }
      #     이 경우 외부 err가 의도치 않게 가려진다 (shadowed).
      # Go 초심자가 가장 많이 겪는 실수 중 하나다.
      enable-all: true

    staticcheck:
      # 모든 staticcheck 검사를 활성화하되, godoc 스타일 규칙만 제외한다.
      # ST1000: 패키지 주석 형식, ST1020/21/22: exported 엔티티 주석 형식
      # 이 프로젝트는 한국어 주석을 사용하므로 영문 godoc 형식은 맞지 않는다.
      checks:
        - all
        - -ST1000
        - -ST1020
        - -ST1021
        - -ST1022

    errcheck:
      # 타입 단언에서 에러 체크 여부도 검사한다.
      # 예: val := x.(string) ← ok 변수 없이 사용하면 경고
      check-type-assertions: true
      # _ = fn() 형태로 에러를 빈칸에 할당하는 것도 찾는다.
      check-blank: true

    goconst:
      # 같은 문자열이 3번 이상 반복되면 상수 추출을 제안한다.
      min-occurrences: 3

    nakedret:
      # 함수 길이가 5줄을 초과하면 naked return을 금지한다.
      # 짧은 함수에서는 named return이 충분히 명확하므로 허용.
      max-func-lines: 5

    nolintlint:
      # //nolint 사용 시 반드시 린터 이름을 명시하도록 강제한다.
      # 예: //nolint:errcheck ← OK, //nolint ← 금지 (어떤 린터를 끄는지 불명확)
      require-specific: true

    exhaustive:
      # default case가 있으면 누락된 case를 허용한다.
      # switch에 default:가 있으면 "나머지 경우를 처리한다"는 의미이므로 OK.
      default-signifies-exhaustive: true

    perfsprint:
      # fmt.Errorf는 에러 래핑(%w)에 쓰이므로 제외한다.
      err-error: false

    # --- 새 린터 설정 ---

    # nestif: if문 중첩 깊이 제한.
    # 5단계 이상 중첩되면 early return으로 리팩토링하라는 신호.
    nestif:
      min-complexity: 5

    # gocognit: 인지 복잡도 상한.
    # 30은 "꽤 복잡한 함수"를 허용하되, 극단적으로 복잡한 함수만 잡는 균형점.
    gocognit:
      min-complexity: 30

    # funlen: 함수 길이 제한.
    # lines: 한국어 주석을 고려하여 100줄 (기본 60줄보다 여유있게).
    # statements: 실행문 기준 60개 (주석/빈줄 제외 순수 코드량).
    funlen:
      lines: 100
      statements: 60

    # lll: 줄 길이 제한.
    # 150자: 한국어(글자당 3바이트 UTF-8)와 struct tag를 고려한 값.
    # tab-width: Go 표준 탭 크기 4칸.
    lll:
      line-length: 150
      tab-width: 4

    # mnd: 매직 넘버 검출 설정.
    # 검사 범위: 함수 인자, case문, 조건문, return문 (할당/연산은 제외).
    # 허용 숫자: 0, 1, 2, 10, 100 — 범용적으로 사용되는 숫자.
    # 허용 함수: make, cap, len (용량 지정), strconv.* (문자열 변환), time.* (시간 계산).
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "10"
        - "100"
      ignored-functions:
        - "^make$"
        - "^cap$"
        - "^len$"
        - "strconv\\."
        - "time\\."

    # dupl: 중복 코드 검출 임계값.
    # 150토큰 이상 동일한 코드 블록이 2곳 이상 존재하면 경고.
    dupl:
      threshold: 150

    # ireturn: 인터페이스 반환 허용 목록.
    # error: 에러 인터페이스는 항상 허용.
    # stdlib: 표준 라이브러리 인터페이스(io.Reader 등) 허용.
    # anon: 익명 인터페이스(interface{ Method() }) 허용.
    # generic: 제네릭 인터페이스 허용.
    # go.uber.org/fx: fx.Option 등 DI 프레임워크 인터페이스 허용.
    ireturn:
      allow:
        - error
        - stdlib
        - anon
        - generic
        - "go\\.uber\\.org/fx"
        # huma.API: huma 어댑터와 DI에서 huma.API 인터페이스 반환이 필수적이다.
        # huma.NewAPI()가 인터페이스를 반환하며, 어댑터도 동일 타입을 반환해야 한다.
        - "github\\.com/danielgtaylor/huma"
        # fiber.Ctx: huma 어댑터에서 Fiber 컨텍스트 언래핑 시 인터페이스 반환이 필수적이다.
        # Fiber v3에서 Ctx는 인터페이스 타입이므로 구체 타입 반환이 불가능하다.
        - "github\\.com/gofiber/fiber"

    # depguard: 금지 패키지 규칙.
    # "log" 패키지를 금지하여 go.uber.org/zap 사용을 강제한다.
    # 이유: 구조화 로깅(structured logging)은 운영 환경에서 필수이며,
    # 표준 log 패키지는 구조화를 지원하지 않는다.
    depguard:
      rules:
        main:
          deny:
            - pkg: "log"
              desc: "log 패키지 대신 go.uber.org/zap을 사용한다"

    # wrapcheck: 에러 래핑 검사 제외 패키지.
    # 프로젝트 내부(rest-api/*) 에러는 이미 컨텍스트가 충분하므로 래핑 불필요.
    # Fiber 핸들러의 c.JSON(), c.SendStatus() 등은 HTTP 응답을 클라이언트에 보내는
    # 터미널 동작이다. 이 에러를 래핑해도 상위 호출자(Fiber 프레임워크)가 활용하지 않으므로
    # 래핑이 무의미하다. NestJS에서 res.json()의 반환값을 래핑하지 않는 것과 같다.
    # golangci-lint v2에서는 모든 설정 키가 kebab-case다.
    # (camelCase인 ignorePackageGlobs는 v2에서 유효하지 않다)
    wrapcheck:
      # 프로젝트 내부(rest-api/*) 에러는 이미 컨텍스트가 충분하므로 래핑 불필요.
      # Fiber 패키지(github.com/gofiber/fiber/*)의 에러도 래핑 불필요 —
      # c.JSON(), c.SendStatus() 등은 HTTP 응답을 보내는 터미널 동작이다.
      ignore-package-globs:
        - "rest-api/*"
        - "github.com/gofiber/fiber/*"
      # Fiber의 c.JSON(), c.SendStatus()는 인터페이스(fiber.Ctx) 메서드 호출이다.
      # wrapcheck는 인터페이스 메서드와 일반 함수 호출을 별도로 검사하므로
      # ignore-package-globs와 ignore-interface-regexps 두 가지 설정이 모두 필요하다.
      ignore-interface-regexps:
        - "Ctx"

    # varnamelen: 변수명 길이 규칙.
    # max-distance: 선언~마지막 사용 간 최대 6줄 (짧은 스코프에서는 짧은 이름 OK).
    # min-name-length: 2글자 미만 변수명 검사 (i, n 등은 ignore-decls로 예외).
    # Go 관례적 짧은 이름(err, ctx, db, ok, c 등)은 모두 예외 처리.
    varnamelen:
      max-distance: 6
      min-name-length: 2
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - i int
        - j int
        - n int
        - w http.ResponseWriter
        - r *http.Request
        - c fiber.Ctx
        - t testing.T
        - b testing.B
        - db *sql.DB
        - tx *sql.Tx
        - wg sync.WaitGroup
        - mu sync.Mutex
        - ok bool
        - err error
        - ctx context.Context
        - ln net.Listener
        - lc fx.Lifecycle
        - fs embed.FS

  exclusions:
    # golangci-lint v2 내장 프리셋: 흔한 오탐(false positive)을 자동으로 제외한다.
    # - common-false-positives: 일반적인 오탐 패턴
    # - std-error-handling: 표준 에러 처리 패턴 (err.Error() 등)
    presets:
      - common-false-positives
      - std-error-handling

    rules:
      # gochecknoglobals: 센티넬 에러(ErrXxx)는 Go 관례상 글로벌 변수로 정의한다.
      # Uber 스타일 가이드에서도 "var ErrFoo = errors.New(...)" 패턴을 권장.
      - linters:
          - gochecknoglobals
        text: "`Err[A-Z]"

      # ireturn: DDD 레이어(svc, repo)의 생성자는 인터페이스를 반환하는 것이 정상.
      # 의존성 역전 원칙(DIP)을 위해 생성자가 인터페이스를 반환한다.
      - linters:
          - ireturn
        path: "internal/domain/"

      # wrapcheck: cmd/ 패키지에서는 에러 래핑이 불필요한 경우가 많다.
      # fx 부트스트랩 코드에서 외부 에러를 직접 반환하는 것은 자연스럽다.
      - linters:
          - wrapcheck
        path: "cmd/"

      # lll: go:embed 주석은 줄 길이 제한에서 제외한다.
      # go:embed 디렉티브는 줄이 길어질 수 있다.
      - linters:
          - lll
        source: "^//go:"

      # funlen: 테스트 함수는 길이 제한을 완화한다.
      # table-driven test는 테스트 케이스가 많으면 자연스럽게 길어진다.
      - linters:
          - funlen
        path: "_test\\.go$"

issues:
  # 린터당 이슈 수 제한을 없앤다. 모든 이슈를 빠짐없이 보여준다.
  # 기본값은 50개인데, 50개를 넘기면 나머지가 숨겨져 문제를 놓칠 수 있다.
  max-issues-per-linter: 0
  # 같은 종류의 이슈 수 제한도 없앤다.
  max-same-issues: 0

formatters:
  enable:
    # gofumpt: gofmt의 상위 호환 포매터. gofmt 규칙에 추가 정리 규칙을 적용한다.
    # 예: 불필요한 빈 줄 제거, 함수 인자 정렬 등.
    - gofumpt

    # gci: import 문을 3그룹으로 자동 정렬하는 포매터다.
    # 우버 스타일 가이드 권장: 표준 라이브러리 → 외부 패키지 → 내부 패키지
    # NestJS에서 import 순서를 ESLint/Prettier로 강제하는 것과 같다.
    - gci

  settings:
    gofumpt:
      # 모듈 경로를 명시적으로 설정한다.
      # gofumpt는 모듈 이름에 도메인(예: github.com)이 없으면 표준 라이브러리로 오인한다.
      # "rest-api"는 도메인 없는 모듈명이므로, 명시적으로 설정해야
      # "rest-api/internal/..."를 프로젝트 내부 패키지로 올바르게 인식한다.
      module-path: rest-api

    gci:
      # import 문을 3그룹으로 나누어 빈 줄로 구분한다.
      # 우버 Go 스타일 가이드의 "Import Group Ordering" 규칙을 강제한다.
      #
      # 정렬 결과 예시:
      #   import (
      #       "context"           // 1그룹: 표준 라이브러리
      #       "fmt"
      #
      #       "github.com/..."    // 2그룹: 외부 패키지
      #       "go.uber.org/..."
      #
      #       "rest-api/..."      // 3그룹: 프로젝트 내부 패키지
      #   )
      sections:
        - standard # Go 표준 라이브러리 (fmt, net/http, context 등)
        - default # 외부 의존성 (github.com/*, go.uber.org/* 등)
        - prefix(rest-api) # 프로젝트 내부 패키지
